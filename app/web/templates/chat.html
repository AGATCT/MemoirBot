{% extends "base.html" %}
{% block title %}聊天 - MemoirBot{% endblock %}

{% block content %}
<div class="chat-container">
    <!-- 会话列表 -->
    <aside class="session-panel">
        <div class="session-panel-header">
            <h2>对话</h2>
            <button id="btn-new-session" class="btn btn-primary btn-sm">+ 新对话</button>
        </div>
        <div id="session-list" class="session-list">
            <p class="text-muted">加载中...</p>
        </div>
    </aside>

    <!-- 聊天区域 -->
    <div class="chat-main" id="chat-main">
        <div id="no-session-hint" class="chat-placeholder">
            <div class="placeholder-icon">·</div>
            <h2>欢迎使用 MemoirBot</h2>
            <p>选择一个对话或创建新对话开始聊天</p>
            <p class="text-muted">AI 助手会在对话中了解你，并将重要信息保存为记忆</p>
        </div>

        <div id="chat-area" class="chat-area" style="display:none;">
            <!-- 标题栏 -->
            <div id="chat-title-bar" class="chat-title-bar" title="双击重命名">对话</div>
            <!-- 消息列表 -->
            <div id="message-list" class="message-list"></div>

            <!-- 矛盾提醒卡片 (Phase 5) -->
            <div id="contradiction-card" class="contradiction-card" style="display:none;"></div>

            <!-- 输入区 -->
            <div class="chat-input-area">
                <textarea
                    id="chat-input"
                    class="chat-input"
                    placeholder="输入消息... (Enter 发送，Shift+Enter 换行)"
                    rows="2"
                ></textarea>
                <div class="chat-input-toolbar">
                    <div class="think-controls">
                        <label class="think-toggle" title="开启后 AI 会先思考再回复">
                            <input type="checkbox" id="think-mode">
                            <span class="think-toggle-track">
                                <span class="think-toggle-text">深度思考</span>
                            </span>
                        </label>
                        <span class="effort-switch" title="思考强度">
                            <span class="effort-opt" data-v="high">high</span>
                            <span class="effort-sep">/</span>
                            <span class="effort-opt active" data-v="max">max</span>
                        </span>
                    </div>
                    <button id="btn-send" class="btn-send-icon" disabled title="发送 (Enter)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
