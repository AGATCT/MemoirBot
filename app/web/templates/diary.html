{% extends "base.html" %}
{% block title %}日记 - PersonalAgent{% endblock %}

{% block content %}
<div class="diary-container">
    <!-- 日期导航 -->
    <aside class="diary-sidebar">
        <div class="session-panel-header">
            <h2>日记</h2>
        </div>
        <!-- 月份选择器 -->
        <div style="padding: 12px 16px; border-bottom: 1px solid var(--color-border);">
            <div style="display: flex; gap: 8px; align-items: center;">
                <button id="btn-prev-month" class="btn btn-outline btn-sm" title="上个月">◀</button>
                <span id="current-month-label" style="flex:1; text-align:center; font-weight:500;"></span>
                <button id="btn-next-month" class="btn btn-outline btn-sm" title="下个月">▶</button>
            </div>
            <button id="btn-today" class="btn btn-outline btn-sm" style="width:100%; margin-top:8px;">Today</button>
        </div>
        <!-- 日历 -->
        <div id="calendar-grid" style="padding: 8px 16px; overflow-y: auto; flex: 1;"></div>
        <!-- 所有条目列表 -->
        <div id="entry-list-mini" style="padding: 8px 16px; border-top: 1px solid var(--color-border); overflow-y: auto; max-height: 200px;"></div>
    </aside>

    <!-- 编辑器 -->
    <div class="diary-editor" id="diary-editor">
        <div id="no-entry-hint" class="chat-placeholder">
            <div class="placeholder-icon">&mdash;</div>
            <h2>选择一个日期</h2>
            <p>在左侧日历中选择一个日期来写日记</p>
            <p class="text-muted">有日记的日期会以蓝色圆点标记</p>
        </div>

        <div id="entry-editor" style="display:none; flex-direction:column; height:100%;">
            <div class="diary-editor-header">
                <h3 id="entry-date-label"></h3>
                <div style="display: flex; gap: 8px;">
                    <select id="entry-mood" class="btn btn-outline btn-sm">
                        <option value="">Mood</option>
                        <option value="happy">Happy</option>
                        <option value="sad">Sad</option>
                        <option value="productive">Productive</option>
                        <option value="tired">Tired</option>
                        <option value="excited">Excited</option>
                        <option value="neutral">Neutral</option>
                    </select>
                    <button id="btn-delete-entry" class="btn btn-danger btn-sm">删除</button>
                </div>
            </div>
            <div class="diary-content-area">
                <textarea
                    id="diary-textarea"
                    class="diary-textarea"
                    placeholder="今天发生了什么？..."
                ></textarea>
                <div class="diary-meta">
                    <input
                        type="text"
                        id="entry-tags"
                        placeholder="标签（逗号分隔）"
                        style="flex:1; padding:6px 10px; border:1px solid var(--color-border); border-radius:var(--radius); font-size:13px;"
                    />
                    <span id="save-status" class="text-muted text-sm"></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/diary.js"></script>
{% endblock %}
